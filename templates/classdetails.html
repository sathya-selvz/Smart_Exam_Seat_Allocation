<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Selected Classrooms</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />   
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }
      .header-card {
        background: white;
        border-radius: 15px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        padding: 1.5rem;
        margin-bottom: 2rem;
        position: sticky;
        top: 0;
        z-index: 1000;
      }
      .content-card {
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        padding: 2.5rem;
      }
      .classroom-card {
        background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        padding: 1.25rem;
        margin-bottom: 1rem;
        border: 2px solid #667eea;
        transition: all 0.3s ease;
        text-align: center;
      }
      .classroom-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        border-color: #764ba2;
      }
      .classroom-name {
        font-weight: 700;
        color: #667eea;
        font-size: 1.1rem;
      }
      h4 {
        color: #667eea;
        font-weight: 700;
      }
      .success-badge {
        background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        color: white;
        padding: 0.5rem 1.5rem;
        border-radius: 20px;
        font-weight: 600;
        display: inline-block;
        margin-bottom: 1.5rem;
      }
    </style>
  </head>
  <body>
    <div class="container py-4">
      <div class="header-card">
        <div class="d-flex justify-content-between align-items-center">
          <h4 class="mb-0">🏛️ Selected Classrooms</h4>
          <a href="/admin" class="btn btn-outline-secondary btn-sm">🏠 Admin Home</a>
        </div>
      </div>

      <div class="content-card">
        <div class="text-center">
          <div class="success-badge">✅ {{ class_data|length }} Classrooms Selected</div>
        </div>
        
        <div class="row row-cols-2 row-cols-md-4 row-cols-lg-6 g-3">
          {% for classroom in class_data %}
          <div class="col">
            <div class="classroom-card">
              <div class="classroom-name">{{ classroom['class_name'] }}</div>
              <small class="text-muted">
                {{ classroom['column'] }}×{{ classroom['rows'] }}
              </small>
            </div>
          </div>
          {% endfor %}
        </div>
        
        <div class="text-center mt-4">
          <a href="/seating" class="btn btn-primary btn-lg" onclick="showLoadingScreen()">
            ⚡ Generate Seating Arrangement
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
