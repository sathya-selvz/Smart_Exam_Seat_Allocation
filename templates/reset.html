<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Reset Data</title>
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }
      .header-card {
        background: white;
        border-radius: 15px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        padding: 1.5rem;
        margin-bottom: 2rem;
        position: sticky;
        top: 0;
        z-index: 1000;
      }
      .reset-card {
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        padding: 2.5rem;
      }
      .reset-item {
        background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
        border-left: 4px solid #667eea;
        border-radius: 10px;
        padding: 1.5rem;
        margin-bottom: 1rem;
        transition: all 0.3s ease;
      }
      .reset-item:hover {
        background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
        border-left-color: #764ba2;
        transform: translateX(5px);
      }
      .reset-item a {
        text-decoration: none;
        color: #333;
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .reset-item a:hover {
        color: #667eea;
      }
      .danger-icon {
        color: #dc3545;
        font-size: 1.5rem;
      }
      h4 {
        color: #667eea;
        font-weight: 700;
      }
    </style>
</head>
<body>
    <div class="container py-4">
        <div class="header-card">
          <div class="d-flex justify-content-between align-items-center">
            <h4 class="mb-0">🗑️ Reset Data</h4>
            <a href="/admin" class="btn btn-outline-secondary btn-sm">🏠 Admin Home</a>
          </div>
        </div>
        
        <div class="reset-card">
          <div class="alert alert-warning border-0 shadow-sm mb-4">
            <strong>⚠️ Warning:</strong> These actions will permanently delete data. Use with caution!
          </div>
          
          <h5 class="mb-4">Select what to reset:</h5>
          
          <div class="reset-item">
            <a href="/reset/collections">
              <span><span class="danger-icon">👥</span> Delete Student Data</span>
              <span>→</span>
            </a>
          </div>
          
          <div class="reset-item">
            <a href="/reset/static">
              <span><span class="danger-icon">📁</span> Reset Static Files</span>
              <span>→</span>
            </a>
          </div>
          
          <div class="reset-item">
            <a href="/reset/uploads">
              <span><span class="danger-icon">📄</span> Reset Uploads</span>
              <span>→</span>
            </a>
          </div>
          
          <div class="reset-item">
            <a href="/reset/dates">
              <span><span class="danger-icon">📅</span> Reset Dates</span>
              <span>→</span>
            </a>
          </div>
          
          <div class="reset-item">
            <a href="/reset/users">
              <span><span class="danger-icon">🔑</span> Reset Users</span>
              <span>→</span>
            </a>
          </div>
          
          {% if message %}
          <div class="alert alert-success border-0 shadow-sm mt-4">
            <strong>✅ Success:</strong> {{ message }}
          </div>
          {% endif %}
        </div>
    </div>
</body>
</html>
